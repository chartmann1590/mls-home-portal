services:
  scapling-bridge:
    build:
      context: .
      dockerfile: scapling_bridge/Dockerfile
    container_name: scapling-bridge
    ports:
      - "${SCAPLING_BRIDGE_HOST_PORT:-13000}:3000"
    restart: always

  mls-home-portal:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mls-home-portal
    ports:
      - "${HOST_PORT:-8088}:8088"
    volumes:
      - ./runtime-data:/app/runtime-data
    environment:
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:latest}
      SCAPLING_URL: ${SCAPLING_URL:-http://scapling-bridge:3000}
      SCAPLING_TOKEN: ${SCAPLING_TOKEN:-}
      FLARESOLVERR_URL: ${FLARESOLVERR_URL:-http://host.docker.internal:8191/v1}
      MLS_API_URL: ${MLS_API_URL:-}
      MLS_API_TOKEN: ${MLS_API_TOKEN:-}
      APIFY_TOKEN: ${APIFY_TOKEN:-}
      APIFY_ACTOR: ${APIFY_ACTOR:-tri_angle/real-estate-aggregator}
      ENABLE_MOCK_FALLBACK: ${ENABLE_MOCK_FALLBACK:-false}
    restart: always
    depends_on:
      - scapling-bridge
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8088/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
